apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goodtribes-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:goodtribes-org/deploy.git
    targetRevision: HEAD
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
